<!DOCTYPE html>
<html>
<head>
    <title>Employee Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Employee Management System</h1>

    <form id="employeeForm">

        <input
            type="text"
            id="name"
            placeholder="Name"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="text"
            id="department"
            placeholder="Department"
        >

        <input
            type="number"
            id="salary"
            placeholder="Salary"
        >

        <button type="submit">
            Add Employee
        </button>

    </form>

    <div id="employeeList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
